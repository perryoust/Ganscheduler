<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>קידס שיבוץ - מערכת ניהול</title>

    <link rel="stylesheet" href="style.css">

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
      import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";
      
      const firebaseConfig = {
        apiKey: "AIzaSyCxNhFgvxbD_ZyI9e8rURb7LxNmHX1TrVo",
        databaseURL: "https://ganmanage-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "ganmanage"
      };
      
      const app = initializeApp(firebaseConfig);
      window.fbDB = getDatabase(app);
      window.fbRef = ref; window.fbSet = set; window.fbOnValue = onValue;
    </script>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="color:#1a237e; margin-bottom:10px;">טומשין קידס</h2>
            <p style="margin-bottom:15px;">הכנס קוד גישה למערכת</p>
            <input type="password" id="sys-pin" placeholder="****" style="width:100%; padding:12px; margin-bottom:15px; text-align:center; font-size:20px; border:1px solid #ddd; border-radius:6px;">
            <button onclick="checkLogin()" style="width:100%; padding:12px; background:#ff9800; color:white; border:none; border-radius:6px; font-weight:bold; font-size:18px; cursor:pointer;">כניסה</button>
            <p id="login-error" style="color:red; display:none; margin-top:10px; font-weight:bold;">קוד שגוי, נסה שוב</p>
        </div>
    </div>

    <div id="app-main-container">
        <div class="hdr">
            <h1>טומשין קידס <span id="sync-status" style="font-size:0.65em; background:rgba(0,0,0,0.2); padding:2px 6px; border-radius:4px; margin-right:8px;">מתחבר...</span></h1>
            <div class="hs">
                <span id="hdr-date"></span>
                <span id="hdr-mode" style="background:#ff9800; font-weight:700">מצב שיבוץ</span>
            </div>
            <button class="btn bo bsm" onclick="saveToFirebase()" style="border-color:#fff; color:#fff">💾 שמירה לענן</button>
        </div>

        <div class="mode-bar">
            <button class="mode-btn active" id="m-btn-sched" onclick="setMode('sched')">📅 שיבוץ ולוגיסטיקה</button>
            <button class="mode-btn" id="m-btn-purch" onclick="setMode('purch')">🛒 רכש ומלאי</button>
        </div>

        <div class="tabs" id="main-tabs">
            <div class="tab active" onclick="showPanel('dash')">לוח בקרה</div>
            <div class="tab" onclick="showPanel('placement')">שיבוץ יומי</div>
            <div class="tab" onclick="showPanel('teachers')">גננות</div>
            <div class="tab" onclick="showPanel('gardens')">גנים</div>
            <div class="tab" onclick="showPanel('settings')">הגדרות</div>
        </div>

        <div class="content">
            <div id="p-dash" class="panel active">
                <div class="sgrid">
                    <div class="sc"><div class="sn" id="st-total">0</div><div class="sl">סה"כ גנים</div></div>
                    <div class="sc"><div class="sn" id="st-pending">0</div><div class="sl">ממתין לביצוע</div></div>
                    <div class="sc"><div class="sn" id="st-done" style="color:#2e7d32">0</div><div class="sl">בוצע בהצלחה</div></div>
                </div>
                <div id="dash-content"></div>
            </div>

            <div id="p-placement" class="panel">
                <div class="card">
                    <div class="row">
                        <div class="fg"><label>תאריך</label><input type="date" id="view-date" onchange="render()"></div>
                        <button class="btn bg" onclick="openNewEventModal()">+ שיבוץ חדש</button>
                    </div>
                </div>
                <div id="placement-content"></div>
            </div>

            <div id="p-teachers" class="panel">
                <div id="teachers-grid"></div>
            </div>

            <div id="p-gardens" class="panel">
                <div id="gardens-grid"></div>
            </div>

            <div id="p-settings" class="panel">
                <div class="card">
                    <h3>ניהול נתונים</h3>
                    <p>הנתונים מסונכרנים לענן Firebase.</p>
                </div>
            </div>
        </div>
    </div>

    <div id="backup-ind" style="position:fixed; bottom:20px; left:20px; background:rgba(0,0,0,0.7); color:white; padding:10px 20px; border-radius:20px; display:none;">שומר נתונים...</div>

    <div id="modal-event" class="modal">
        <div class="mb">
            <h2>שיבוץ חדש</h2>
            <div class="fg"><label>גן</label><select id="ev-garden" style="width:100%; padding:8px; margin-bottom:10px;"></select></div>
            <div class="fg"><label>גננת</label><select id="ev-teacher" style="width:100%; padding:8px; margin-bottom:10px;"></select></div>
            <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:15px;">
                <button class="btn" onclick="closeModal('modal-event')">ביטול</button>
                <button class="btn bg" onclick="saveEvent()">שמור</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
