<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>טומשין קידס - ניהול לוגיסטי</title>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
      import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";
      const app = initializeApp({
        apiKey: "AIzaSyCxNhFgvxbD_ZyI9e8rURb7LxNmHX1TrVo",
        databaseURL: "https://ganmanage-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "ganmanage"
      });
      window.fbDB = getDatabase(app);
      window.fbRef = ref; window.fbSet = set; window.fbOnValue = onValue;
    </script>

    <style>
        /* === עיצוב v24 המקורי === */
        :root { --primary: #1a237e; --secondary: #1565c0; --accent: #ff9800; --bg: #f0f2f5; }
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);direction:rtl;padding-bottom:70px}
        
        .hdr{background:linear-gradient(135deg, var(--primary), var(--secondary));color:#fff;padding:12px;display:flex;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
        .hdr h1{font-size:1.1rem;font-weight:800}
        .hs{margin-right:auto;display:flex;gap:10px;font-size:0.8rem}
        .hs span{padding:2px 8px;border-radius:15px;background:rgba(255,255,255,0.1)}

        .tabs{background:#fff;display:flex;overflow-x:auto;border-bottom:1px solid #ddd}
        .tab{padding:12px 18px;cursor:pointer;white-space:nowrap;color:#666;font-weight:600}
        .tab.active{color:var(--secondary);border-bottom:3px solid var(--secondary)}

        .content{padding:12px;max-width:1200px;margin:0 auto}
        .panel{display:none} .panel.active{display:block}
        .card{background:#fff;border-radius:10px;padding:15px;box-shadow:0 2px 5px rgba(0,0,0,0.05);margin-bottom:12px}
        
        .sgrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .sc { background: #fff; padding: 15px; border-radius: 10px; text-align: center; border-bottom: 3px solid var(--secondary); }
        .sn { font-size: 1.5rem; font-weight: 800; color: var(--secondary); }
        .sl { font-size: 0.7rem; color: #666; }

        .btn{padding:8px 14px;border:none;border-radius:6px;cursor:pointer;font-weight:600;font-size:0.8rem}
        .bp{background:var(--secondary);color:#fff}
        .bg{background:#2e7d32;color:#fff}
        .bo{background:#fff;border:1px solid var(--secondary);color:var(--secondary)}

        /* מסך כניסה */
        #login-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--primary);z-index:10000;display:flex;align-items:center;justify-content:center}
        .login-box{background:#fff;padding:30px;border-radius:15px;text-align:center;width:320px}
        #app-main-container{display:none}

        /* מובייל */
        #mob-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;display:flex;justify-content:space-around;padding:10px;border-top:1px solid #ddd}
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2 style="color:var(--primary)">טומשין קידס</h2>
        <input type="password" id="sys-pin" placeholder="קוד גישה" style="width:100%;padding:10px;margin:15px 0;text-align:center;font-size:20px;border:1px solid #ddd;border-radius:8px;">
        <button onclick="checkLogin()" class="btn bp" style="width:100%">כניסה</button>
        <p id="err" style="color:red;display:none;margin-top:10px">קוד שגוי</p>
    </div>
</div>

<div id="app-main-container">
    <div class="hdr">
        <h1>טומשין קידס <span id="sync-status" style="font-size:0.6em;opacity:0.6"></span></h1>
        <div class="hs"><span id="hdr-date"></span></div>
        <button class="btn bo" onclick="saveToFirebase()" style="color:#fff;border-color:#fff;margin-right:10px">💾 שמירה</button>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="showPanel('dash')">ראשי</div>
        <div class="tab" onclick="showPanel('placement')">שיבוץ</div>
        <div class="tab" onclick="showPanel('teachers')">גננות</div>
        <div class="tab" onclick="showPanel('gardens')">גנים</div>
    </div>

    <div class="content">
        <div id="p-dash" class="panel active">
            <div class="sgrid">
                <div class="sc"><div class="sn" id="st-total">0</div><div class="sl">גנים</div></div>
                <div class="sc"><div class="sn" id="st-pending">0</div><div class="sl">ממתין</div></div>
                <div class="sc"><div class="sn" id="st-done">0</div><div class="sl">בוצע</div></div>
            </div>
            <div id="dash-content"></div>
        </div>

        <div id="p-placement" class="panel">
            <div class="card">
                <input type="date" id="view-date" onchange="render()" style="padding:8px;border-radius:5px;border:1px solid #ddd">
                <button class="btn bg" onclick="openNewEventModal()">+ שיבוץ חדש</button>
            </div>
            <div id="placement-content"></div>
        </div>

        <div id="p-teachers" class="panel">
            <div class="card"><button class="btn bp" onclick="openModal('modal-teacher')">+ הוספת גננת</button></div>
            <div id="teachers-grid"></div>
        </div>

        <div id="p-gardens" class="panel">
            <div class="card"><button class="btn bp" onclick="openModal('modal-garden')">+ הוספת גן</button></div>
            <div id="gardens-grid"></div>
        </div>
    </div>
</div>

<div id="modal-teacher" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:10001;align-items:center;justify-content:center;">
    <div style="background:#fff;padding:20px;border-radius:12px;width:300px;">
        <h3>הוספת גננת</h3>
        <input type="text" id="t-name" placeholder="שם הגננת" style="width:100%;padding:8px;margin:10px 0;">
        <button class="btn bg" onclick="saveTeacher()">שמור</button>
        <button class="btn" onclick="closeModal('modal-teacher')">ביטול</button>
    </div>
</div>

<div id="modal-garden" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:10001;align-items:center;justify-content:center;">
    <div style="background:#fff;padding:20px;border-radius:12px;width:300px;">
        <h3>הוספת גן</h3>
        <input type="text" id="g-name" placeholder="שם הגן" style="width:100%;padding:8px;margin:10px 0;">
        <button class="btn bg" onclick="saveGarden()">שמור</button>
        <button class="btn" onclick="closeModal('modal-garden')">ביטול</button>
    </div>
</div>

<script>
    let S = { events: [], teachers: [], gardens: [], ts: Date.now() };

    function checkLogin() {
        if(document.getElementById('sys-pin').value === "1234") {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-main-container').style.display = 'block';
            initCloudSync();
        } else { document.getElementById('err').style.display = 'block'; }
    }

    function initCloudSync() {
        if(!window.fbDB) { setTimeout(initCloudSync, 500); return; }
        const dataRef = window.fbRef(window.fbDB, 'appData');
        window.fbOnValue(dataRef, (snapshot) => {
            const d = snapshot.val();
            if(d) { S = d; window.S = d; }
            document.getElementById('sync-status').innerText = "✅ מחובר";
            render();
        });
    }

    async function saveToFirebase() {
        await window.fbSet(window.fbRef(window.fbDB, 'appData'), S);
    }

    function showPanel(id) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.getElementById('p-' + id).classList.add('active');
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        render();
    }

    function render() {
        const d = document.getElementById('view-date').value || new Date().toISOString().split('T')[0];
        document.getElementById('hdr-date').innerText = new Date(d).toLocaleDateString('he-IL');
        
        // רשימת גננות
        document.getElementById('teachers-grid').innerHTML = S.teachers.map(t => `<div class="card">${t.name}</div>`).join('');
        // רשימת גנים
        document.getElementById('gardens-grid').innerHTML = S.gardens.map(g => `<div class="card">${g.name}</div>`).join('');
        // שיבוצים
        const evs = S.events.filter(e => e.date === d);
        document.getElementById('placement-content').innerHTML = evs.map(e => `<div class="card"><b>${e.garden}</b>: ${e.teacher}</div>`).join('');
        
        document.getElementById('st-total').innerText = S.gardens.length;
    }

    window.saveTeacher = function() {
        const n = document.getElementById('t-name').value;
        if(n) { S.teachers.push({name: n}); saveToFirebase(); closeModal('modal-teacher'); }
    };
    window.saveGarden = function() {
        const n = document.getElementById('g-name').value;
        if(n) { S.gardens.push({name: n}); saveToFirebase(); closeModal('modal-garden'); }
    };
    window.openModal = id => document.getElementById(id).style.display = 'flex';
    window.closeModal = id => document.getElementById(id).style.display = 'none';

    document.getElementById('view-date').value = new Date().toISOString().split('T')[0];
</script>
</body>
</html>
