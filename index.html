<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>טומשין קידס - v10.0</title>

<style>
    /* מסך כניסה חדש ששמתי מעל האתר שלך */
    #lock-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #1a237e; display: flex; align-items: center; justify-content: center;
        z-index: 99999; color: white; font-family: sans-serif;
    }
    .lock-box { background: white; padding: 30px; border-radius: 15px; text-align: center; color: #333; width: 320px; }
    #actual-site { display: none; }

    /* ה-CSS המקורי שלך מתחיל כאן */
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f2f5;color:#222;direction:rtl;font-size:14px}
    .hdr{background:linear-gradient(135deg,#1a237e,#1565c0);color:#fff;padding:11px 18px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 10px rgba(0,0,0,.25);flex-wrap:wrap}
    .hdr h1{font-size:1.15rem;font-weight:800;letter-spacing:-.01em;white-space:nowrap}
    /* ... שאר העיצוב המקורי שלך נשמר ... */
    .card{background:#fff;border-radius:10px;padding:13px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:12px;position:relative;border-right:5px solid #1a237e}
    .btn{padding:8px 11px;border:none;border-radius:7px;cursor:pointer;font-weight:700;font-size:.8rem;transition:all .15s}
    .bp{background:#1565c0;color:#fff}
    .br{background:#c62828;color:#fff}
</style>
</head>
<body>

<div id="lock-screen">
    <div class="lock-box">
        <h2 style="color:#1a237e; margin-bottom:15px;">טומשין קידס</h2>
        <input type="password" id="main-pass" placeholder="קוד גישה" style="width:100%; padding:12px; text-align:center; font-size:20px; border:2px solid #ddd; border-radius:8px; margin-bottom:15px;">
        <button onclick="unlock()" style="width:100%; padding:12px; background:#ff9800; color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">כניסה</button>
    </div>
</div>

<div id="actual-site">
    <div class="hdr">
        <h1>טומשין קידס <span style="font-size:0.6em; opacity:0.7">v10.0</span></h1>
        <div style="margin-right:auto" id="hdr-date"></div>
    </div>

    <div style="background:#fff; padding:10px; border-bottom:1px solid #ddd; display:flex; gap:10px; justify-content:center; position:sticky; top:0; z-index:1000">
        <button class="btn bp" onclick="changeDate(-1)">◄</button>
        <input type="date" id="main-date-picker" onchange="setDate(this.value)" style="padding:6px; border:1px solid #ccc; border-radius:5px;">
        <button class="btn bp" onclick="changeDate(1)">►</button>
    </div>

    <div class="content" id="render-cont">
        </div>
</div>

<script>
    // לוגיקה חדשה שקוראת את הנתונים שלך בלי לבקש Token
    let S = { raws: [], viewDate: new Date().toISOString().split('T')[0] };

    function unlock() {
        if(document.getElementById('main-pass').value === "1234") {
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('actual-site').style.display = 'block';
            loadData();
        } else {
            alert("קוד שגוי");
        }
    }

    async function loadData() {
        try {
            const response = await fetch('sraws.json');
            S.raws = await response.json();
            document.getElementById('main-date-picker').value = S.viewDate;
            render();
        } catch (e) {
            document.getElementById('render-cont').innerHTML = "שגיאה: קובץ sraws.json לא נמצא ב-GitHub";
        }
    }

    function render() {
        const cont = document.getElementById('render-cont');
        const dayData = S.raws.filter(r => r.d === S.viewDate);
        
        document.getElementById('hdr-date').innerText = new Date(S.viewDate).toLocaleDateString('he-IL', {weekday:'long', day:'numeric', month:'numeric'});

        if (dayData.length === 0) {
            cont.innerHTML = '<div style="text-align:center;padding:100px;color:#999;">אין פעילות לתאריך זה.</div>';
            return;
        }

        cont.innerHTML = dayData.map(r => `
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <div style="font-weight:800; font-size:1.15rem; color:#1a237e;">גן ${r.g}</div>
                        <div style="font-weight:600; margin-top:5px; font-size:1rem;">${r.a}</div>
                    </div>
                    <div style="text-align:left;">
                        <div style="font-weight:900; font-size:1.2rem; color:#1565c0;">${r.t}</div>
                        <div style="font-size:0.85rem; color:#666;">${r.p}</div>
                    </div>
                </div>
                <div style="margin-top:15px; display:flex; gap:10px;">
                    <button class="btn bp" style="flex:1">פרטים</button>
                    <button class="btn br" style="flex:1" onclick="alert('דיווח Nohap בגרסת ענן יופעל בקרוב')">דווח ביטול</button>
                </div>
            </div>
        `).join('');
    }

    window.setDate = function(v) { S.viewDate = v; render(); };
    window.changeDate = function(n) {
        let d = new Date(S.viewDate);
        d.setDate(d.getDate() + n);
        S.viewDate = d.toISOString().split('T')[0];
        document.getElementById('main-date-picker').value = S.viewDate;
        render();
    };
</script>
</body>
</html>
