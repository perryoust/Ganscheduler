    <script>
// === הגדרות ומצב מערכת ===
let S = { 
  events: [], teachers: [], gardens: [], 
  settings: { cities: ["ראשון לציון", "חולון", "בת ים"] },
  ts: Date.now() 
};
window.S = S;

// === מנגנון כניסה וסנכרון ענן ===
function checkLogin() {
    const pin = document.getElementById('sys-pin').value;
    if (pin === "1234") {
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('app-main-content').style.display = 'block';
        initCloudSync();
    } else {
        document.getElementById('login-error').style.display = 'block';
    }
}

function initCloudSync() {
    const status = document.getElementById('sync-status');
    if (!window.fbDB) return;

    const dataRef = window.fbRef(window.fbDB, 'appData');
    window.fbOnValue(dataRef, (snapshot) => {
        const cloudData = snapshot.val();
        if (cloudData) {
            window.S = cloudData;
            S = cloudData;
            status.innerText = "מחובר לענן ☁️";
            status.style.background = "#2e7d32";
            render();
        } else {
            status.innerText = "ענן ריק - מוכן לעבודה";
            render();
        }
    });
}

async function saveToFirebase() {
    const ind = document.getElementById('backup-ind');
    ind.classList.add('show');
    
    try {
        S.ts = Date.now();
        await window.fbSet(window.fbRef(window.fbDB, 'appData'), S);
        setTimeout(() => ind.classList.remove('show'), 2000);
    } catch (e) {
        alert("שגיאה בשמירה לענן: " + e.message);
    }
}

// === פונקציות ניהול נתונים (ליבה) ===
function setMode(m) {
    document.body.className = (m === 'purch') ? 'mode-purch' : 'mode-sched';
    document.getElementById('m-btn-sched').classList.toggle('active', m === 'sched');
    document.getElementById('m-btn-purch').classList.toggle('active', m === 'purch');
    document.getElementById('hdr-mode').innerText = (m === 'purch') ? 'מצב רכש' : 'מצב שיבוץ';
}

function showPanel(id) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('p-' + id).classList.add('active');
    document.querySelectorAll('.tab, .mob-nav-btn').forEach(t => t.classList.remove('active'));
    render();
}

function render() {
    const d = document.getElementById('view-date').value || new Date().toISOString().split('T')[0];
    document.getElementById('hdr-date').innerText = new Date(d).toLocaleDateString('he-IL');
    
    updateStats();
    renderPlacement(d);
    if(document.getElementById('p-teachers').classList.contains('active')) renderTeachers();
    if(document.getElementById('p-gardens').classList.contains('active')) renderGardens();
}

function updateStats() {
    document.getElementById('st-total').innerText = S.gardens.length;
    document.getElementById('st-pending').innerText = S.events.filter(e => !e.done).length;
    document.getElementById('st-done').innerText = S.events.filter(e => e.done).length;
}

function renderPlacement(date) {
    const cont = document.getElementById('placement-content');
    const dayEvents = S.events.filter(e => e.date === date);
    
    if (dayEvents.length === 0) {
        cont.innerHTML = '<div class="pempty">אין שיבוצים לתאריך זה. לחץ על "שיבוץ חדש" כדי להתחיל.</div>';
        return;
    }

    let html = '<div class="pairs-4col">';
    dayEvents.forEach(ev => {
        html += `
            <div class="pair-card">
                <div class="pair-card-hdr" style="background:#1565c0">
                    <span>${ev.time}</span>
                </div>
                <div class="pair-card-body">
                    <div class="pair-card-label">
                        <div class="pcl-name">${ev.garden}</div>
                    </div>
                    <div class="pair-garden-row">
                        <div class="pgr-left">
                            <div class="pgr-name">${ev.teacher}</div>
                            <div class="pgr-status">${ev.done ? '✅ בוצע' : '⏳ ממתין'}</div>
                        </div>
                        <div class="pgr-right">
                             <button class="btn bsm bo" onclick="toggleEvent('${ev.id}')">${ev.done ? 'בטל' : 'בצע'}</button>
                        </div>
                    </div>
                </div>
            </div>`;
    });
    html += '</div>';
    cont.innerHTML = html;
}

// === פונקציות עזר ומודלים ===
function openNewEventModal() {
    const gSel = document.getElementById('ev-garden');
    const tSel = document.getElementById('ev-teacher');
    
    gSel.innerHTML = S.gardens.map(g => `<option>${g.name}</option>`).join('');
    tSel.innerHTML = S.teachers.map(t => `<option>${t.name}</option>`).join('');
    
    document.getElementById('ev-date').value = document.getElementById('view-date').value;
    document.getElementById('modal-event').classList.add('open');
}

function saveEvent() {
    const newEv = {
        id: 'ev_' + Date.now(),
        garden: document.getElementById('ev-garden').value,
        teacher: document.getElementById('ev-teacher').value,
        date: document.getElementById('ev-date').value,
        time: document.getElementById('ev-time').value,
        done: false
    };
    S.events.push(newEv);
    closeModal('modal-event');
    saveToFirebase();
}

function toggleEvent(id) {
    const ev = S.events.find(e => e.id === id);
    if(ev) ev.done = !ev.done;
    saveToFirebase();
}

function closeModal(id) {
    document.getElementById(id).classList.remove('open');
}

function changeDate(n) {
    const inp = document.getElementById('view-date');
    const d = new Date(inp.value || new Date());
    d.setDate(d.getDate() + n);
    inp.value = d.toISOString().split('T')[0];
    render();
}

// אתחול ראשוני של התאריך
document.getElementById('view-date').value = new Date().toISOString().split('T')[0];
</script>
