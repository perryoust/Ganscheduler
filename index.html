<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>קידס שיבוץ - LIVE</title>
    
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
      import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

      const firebaseConfig = {
        apiKey: "AIzaSyCxNhFgvxbD_ZyI9e8rURb7LxNmHX1TrVo",
        authDomain: "ganmanage.firebaseapp.com",
        databaseURL: "https://ganmanage-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "ganmanage",
        storageBucket: "ganmanage.firebasestorage.app",
        messagingSenderId: "413817150565",
        appId: "1:413817150565:web:7280acfddeed24c269ba8c"
      };

      const app = initializeApp(firebaseConfig);
      window.fbDB = getDatabase(app);
      window.fbRef = ref;
      window.fbSet = set;
      window.fbOnValue = onValue;

      // פונקציית שמירה חדשה לענן
      window.saveToCloud = function(data) {
        window.fbSet(window.fbRef(window.fbDB, 'appData'), data)
          .then(() => console.log("נשמר בענן!"))
          .catch(err => alert("שגיאת שמירה: " + err));
      };

      // 2. טעינת הקוד המקורי שלך והפיכתו ל-Live
      fetch('app.js')
        .then(response => response.text())
        .then(code => {
          // כאן אנחנו "מזריקים" את השינויים לקוד של קלוד בלי לגעת בקובץ המקורי
          let updatedCode = code.replace(/saveData\(\)/g, "saveToCloud(S)");
          
          const script = document.createElement('script');
          script.textContent = updatedCode;
          document.body.appendChild(script);
          
          // הפעלת סנכרון Live
          window.fbOnValue(window.fbRef(window.fbDB, 'appData'), (snapshot) => {
            const val = snapshot.val();
            if (val) {
              window.S = val;
              if (typeof renderAll === "function") renderAll();
            }
          });
        });
    </script>
</head>
<body>
    <div id="loading" style="text-align:center; padding:50px; font-family:sans-serif;">טוען מערכת מסונכרנת...</div>
</body>
</html>
