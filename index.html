<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>טומשין קידס - ניהול לוגיסטי</title>

    <link rel="stylesheet" href="style.css?v=2.0">

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
      import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";
      
      const firebaseConfig = {
        apiKey: "AIzaSyCxNhFgvxbD_ZyI9e8rURb7LxNmHX1TrVo",
        databaseURL: "https://ganmanage-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "ganmanage"
      };
      
      const app = initializeApp(firebaseConfig);
      window.fbDB = getDatabase(app);
      window.fbRef = ref; window.fbSet = set; window.fbOnValue = onValue;
    </script>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>טומשין קידס</h2>
            <p>הכנס קוד גישה למערכת</p>
            <input type="password" id="sys-pin" placeholder="****">
            <button onclick="checkLogin()" class="btn bp" style="width:100%; font-size:1.1rem;">כניסה</button>
            <p id="login-error" style="color:red; display:none; margin-top:10px; font-weight:bold;">קוד שגוי!</p>
        </div>
    </div>

    <div id="app-main-container">
        <div class="hdr">
            <h1>טומשין קידס <span id="sync-status">מתחבר...</span></h1>
            <div class="hs">
                <span id="hdr-date"></span>
                <span id="hdr-mode">מצב שיבוץ</span>
            </div>
            <button class="btn bo bsm" onclick="saveToFirebase()" style="border-color:#fff; color:#fff">💾 שמירה לענן</button>
        </div>

        <div class="mode-bar">
            <button class="mode-btn active" id="m-btn-sched" onclick="setMode('sched')">📅 שיבוץ ולוגיסטיקה</button>
            <button class="mode-btn" id="m-btn-purch" onclick="setMode('purch')">🛒 רכש ומלאי</button>
        </div>

        <div class="tabs" id="main-tabs">
            <div class="tab active" onclick="showPanel('dash')">לוח בקרה</div>
            <div class="tab" onclick="showPanel('placement')">שיבוץ יומי</div>
            <div class="tab" onclick="showPanel('teachers')">גננות</div>
            <div class="tab" onclick="showPanel('gardens')">גנים</div>
            <div class="tab" onclick="showPanel('settings')">הגדרות</div>
        </div>

        <div class="content">
            <div id="p-dash" class="panel active">
                <div class="sgrid">
                    <div class="sc"><div class="sn" id="st-total">0</div><div class="sl">סה"כ גנים</div></div>
                    <div class="sc"><div class="sn" id="st-pending">0</div><div class="sl">ממתין</div></div>
                    <div class="sc"><div class="sn" id="st-done" style="color:#2e7d32">0</div><div class="sl">בוצע</div></div>
                </div>
                <div id="dash-content"></div>
            </div>

            <div id="p-placement" class="panel">
                <div class="card">
                    <div class="row">
                        <div class="fg"><label>תאריך</label><input type="date" id="view-date" onchange="render()"></div>
                        <button class="btn bg" onclick="openNewEventModal()">+ שיבוץ חדש</button>
                    </div>
                </div>
                <div id="placement-content"></div>
            </div>

            <div id="p-teachers" class="panel">
                <div class="card">
                    <div class="row">
                        <button class="btn bp" onclick="openTeacherModal()">+ הוספת גננת</button>
                    </div>
                </div>
                <div id="teachers-grid" class="pgrid"></div>
            </div>

            <div id="p-gardens" class="panel">
                <div class="card">
                    <div class="row">
                        <button class="btn bp" onclick="openGardenModal()">+ הוספת גן</button>
                    </div>
                </div>
                <div id="gardens-grid" class="ggrid"></div>
            </div>

            <div id="p-settings" class="panel">
                <div class="card">
                    <h3>ניהול מערכת</h3>
                    <p>הנתונים שלך מסונכרנים כעת לענן גוגל (Firebase).</p>
                </div>
            </div>
        </div>

        <div id="mob-nav">
            <div class="mob-nav-inner">
                <button class="mob-nav-btn active" onclick="showPanel('dash')">📊<span>ראשי</span></button>
                <button class="mob-nav-btn" onclick="showPanel('placement')">📅<span>שיבוץ</span></button>
                <button class="mob-nav-btn" onclick="openNewEventModal()">➕<span>חדש</span></button>
            </div>
        </div>
    </div>

    <div id="backup-ind">שומר נתונים...</div>

    <div id="modal-event" class="modal"><div class="mb">
        <h2>שיבוץ חדש</h2>
        <div class="fg" style="margin-top:10px"><label>גן</label><select id="ev-garden" style="width:100%"></select></div>
        <div class="fg" style="margin-top:10px"><label>גננת</label><select id="ev-teacher" style="width:100%"></select></div>
        <div class="row" style="margin-top:20px; justify-content:flex-end">
            <button class="btn" onclick="closeModal('modal-event')">ביטול</button>
            <button class="btn bg" onclick="saveEvent()">שמור</button>
        </div>
    </div></div>

    <div id="modal-teacher" class="modal"><div class="mb">
        <h2>הוספת גננת</h2>
        <div class="fg"><label>שם מלא</label><input type="text" id="t-name" style="width:100%"></div>
        <div class="row" style="margin-top:20px; justify-content:flex-end">
            <button class="btn" onclick="closeModal('modal-teacher')">ביטול</button>
            <button class="btn bg" onclick="saveTeacher()">שמור</button>
        </div>
    </div></div>

    <div id="modal-garden" class="modal"><div class="mb">
        <h2>הוספת גן</h2>
        <div class="fg"><label>שם הגן</label><input type="text" id="g-name" style="width:100%"></div>
        <div class="row" style="margin-top:20px; justify-content:flex-end">
            <button class="btn" onclick="closeModal('modal-garden')">ביטול</button>
            <button class="btn bg" onclick="saveGarden()">שמור</button>
        </div>
    </div></div>

    <script src="app.js?v=2.0"></script>
</body>
</html>
