<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="קידס שיבוץ">
<meta name="theme-color" content="#1a237e">
<title>ניהול לוגיסטי טומשין קידס</title>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";
  const app = initializeApp({
    apiKey: "AIzaSyCxNhFgvxbD_ZyI9e8rURb7LxNmHX1TrVo",
    databaseURL: "https://ganmanage-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "ganmanage"
  });
  window.fbDB = getDatabase(app);
  window.fbRef = ref; window.fbSet = set; window.fbOnValue = onValue;
</script>

<style>
/* העיצוב המקורי שלך */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f2f5;color:#222;direction:rtl;font-size:14px}
.hdr{background:linear-gradient(135deg,#1a237e,#1565c0);color:#fff;padding:11px 18px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 10px rgba(0,0,0,.25);flex-wrap:wrap}
.hdr h1{font-size:1.15rem;font-weight:800;letter-spacing:-.01em;white-space:nowrap}
.hs{margin-right:auto;display:flex;gap:10px;font-size:.77rem;opacity:.92;flex-wrap:wrap}
.hs span{padding:3px 7px;border-radius:20px;background:rgba(255,255,255,.1);transition:background .12s;white-space:nowrap}
.mode-bar{display:flex;background:#0d1b4e;padding:0 16px;gap:2px;border-bottom:3px solid #1565c0;border-top:1.5px solid rgba(255,255,255,.1)}
.mode-btn{padding:9px 24px;cursor:pointer;font-size:.84rem;font-weight:700;color:rgba(255,255,255,.55);border:none;background:transparent;border-bottom:3px solid transparent;margin-bottom:-3px;transition:all .15s;letter-spacing:.02em;white-space:nowrap}
.mode-btn.active{color:#fff;border-bottom-color:#4fc3f7;background:rgba(255,255,255,.12)}
.tabs{background:#fff;border-bottom:2px solid #e8eaf6;display:flex;padding:0 10px;gap:1px;overflow-x:auto}
.tab{padding:9px 14px;cursor:pointer;border-bottom:3px solid transparent;font-size:.8rem;color:#666;white-space:nowrap;transition:all .15s}
.tab.active{color:#1565c0;border-bottom-color:#1565c0;font-weight:700}
.content{padding:12px;max-width:1600px;margin:0 auto}
.panel{display:none}.panel.active{display:block}
.card{background:#fff;border-radius:10px;padding:13px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:12px}
/* מסך כניסה */
#login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #1a237e, #1565c0); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999999; color: white; }
.login-box { background: white; padding: 30px; border-radius: 12px; text-align: center; color: #333; width: 90%; max-width: 350px; }
</style>
</head>
<body>
<div id="login-screen">
    <div class="login-box">
        <h2>טומשין קידס</h2>
        <p>הכנס קוד גישה</p>
        <input type="password" id="sys-pin" style="width:100%;padding:10px;margin:15px 0;text-align:center;font-size:20px;">
        <button onclick="checkLogin()" style="width:100%;padding:10px;background:#ff9800;color:white;border:none;border-radius:5px;font-weight:bold;">כניסה</button>
    </div>
</div>
<div id="app-wrap" style="display:none;">
  <div class="hdr">
    <h1>טומשין קידס <span id="cloud-sync-tag" style="font-size:0.7em;opacity:0.8;">(ענן מוגן)</span></h1>
    <div class="hs">
      <span id="hdr-date"></span>
      <span id="hdr-stat"></span>
      <span id="hdr-mode" style="background:#ff9800;font-weight:700">מצב שיבוץ</span>
    </div>
    <button class="btn bo bsm" onclick="saveToFirebase()" style="border-color:#fff;color:#fff">💾 שמירה לענן</button>
  </div>

  <div class="mode-bar">
    <button class="mode-btn active" id="m-btn-sched" onclick="setMode('sched')">📅 שיבוץ ולוגיסטיקה</button>
    <button class="mode-btn" id="m-btn-purch" onclick="setMode('purch')">🛒 רכש ומלאי</button>
  </div>

  <div class="tabs" id="main-tabs">
    <div class="tab active" onclick="showPanel('dash')">לוח בקרה</div>
    <div class="tab" onclick="showPanel('placement')">שיבוץ יומי</div>
    <div class="tab" onclick="showPanel('calendar')">יומן שבועי</div>
    <div class="tab" onclick="showPanel('month')">חודשי</div>
    <div class="tab" onclick="showPanel('teachers')">גננות</div>
    <div class="tab" onclick="showPanel('gardens')">גנים</div>
    <div class="tab" onclick="showPanel('settings')">הגדרות</div>
  </div>

  <div class="content">
    <div id="p-dash" class="panel active">
      <div class="sgrid">
        <div class="sc"><div class="sn" id="st-total">0</div><div class="sl">סה"כ גנים</div></div>
        <div class="sc"><div class="sn" id="st-pending">0</div><div class="sl">ממתין</div></div>
        <div class="sc"><div class="sn" id="st-done" style="color:#2e7d32">0</div><div class="sl">בוצע</div></div>
        <div class="sc"><div class="sn" id="st-issue" style="color:#c62828">0</div><div class="sl">ביטולים</div></div>
      </div>
      <div id="dash-content"></div>
    </div>

    <div id="p-placement" class="panel">
      <div class="card">
        <div class="row">
          <div class="fg"><label>תאריך</label><input type="date" id="view-date" onchange="render()"></div>
          <button class="btn bp" onclick="changeDate(-1)">◀ יום קודם</button>
          <button class="btn bp" onclick="changeDate(1)">יום הבא ▶</button>
          <button class="btn bg" onclick="openNewEventModal()">+ שיבוץ חדש</button>
        </div>
      </div>
      <div id="placement-content"></div>
    </div>

    <div id="p-teachers" class="panel">
      <div class="card">
        <div class="row">
          <button class="btn bp" onclick="openTeacherModal()">+ הוספת גננת</button>
          <input type="text" id="t-search" placeholder="חיפוש גננת..." oninput="renderTeachers()">
        </div>
      </div>
      <div id="teachers-grid" class="pgrid"></div>
    </div>

    <div id="p-gardens" class="panel">
      <div class="card">
        <div class="row">
          <button class="btn bp" onclick="openGardenModal()">+ הוספת גן</button>
          <input type="text" id="g-search" placeholder="חיפוש גן..." oninput="renderGardens()">
        </div>
      </div>
      <div id="gardens-grid" class="ggrid"></div>
    </div>

    <div id="p-settings" class="panel">
      <div class="card">
        <h3>ניהול ענן</h3>
        <p>הנתונים שלך נשמרים כעת ב-Google Firebase בצורה מאובטחת.</p>
        <div class="row" style="margin-top:10px">
           <button class="btn bs" onclick="exportToExcel()">📊 ייצוא לאקסל</button>
           <button class="btn br" onclick="confirmClearAll()">🗑️ איפוס נתונים</button>
        </div>
      </div>
    </div>
  </div>

  <div id="mob-nav">
    <div class="mob-nav-inner">
      <button class="mob-nav-btn active" onclick="showPanel('dash')">📊<span>ראשי</span></button>
      <button class="mob-nav-btn" onclick="showPanel('placement')">📅<span>שיבוץ</span></button>
      <button class="mob-nav-btn" onclick="showPanel('teachers')">👩‍🏫<span>צוות</span></button>
      <button class="mob-nav-btn" onclick="openNewEventModal()">➕<span>חדש</span></button>
    </div>
  </div>

  <div id="backup-ind">שומר...</div>

  <div id="modal-event" class="modal"><div class="mb">
    <h2>שיבוץ חדש</h2>
    <div class="row"><div class="fg" style="flex:1"><label>גן</label><select id="ev-garden"></select></div></div>
    <div class="row" style="margin-top:10px"><div class="fg" style="flex:1"><label>גננת</label><select id="ev-teacher"></select></div></div>
    <div class="row" style="margin-top:10px"><div class="fg"><label>תאריך</label><input type="date" id="ev-date"></div></div>
    <div class="row" style="margin-top:20px;justify-content:flex-end">
      <button class="btn bs" onclick="closeModal('modal-event')">ביטול</button>
      <button class="btn bg" onclick="saveEvent()">שמור</button>
    </div>
  </div></div>
  <script>
// --- אתחול נתונים ומצב מערכת ---
let S = { 
  events: [], teachers: [], gardens: [], 
  settings: { cities: ["ראשון לציון", "חולון", "בת ים"] },
  ts: Date.now() 
};
window.S = S;

// --- מנגנון כניסה וסנכרון ענן (Firebase) ---
function checkLogin() {
    const pin = document.getElementById('sys-pin').value;
    if (pin === "1234") {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app-wrap').style.display = 'block';
        initCloudSync();
    } else {
        document.getElementById('login-error').style.display = 'block';
    }
}

function initCloudSync() {
    if (!window.fbDB) return;
    const tag = document.getElementById('cloud-sync-tag');
    tag.innerText = "⏳ מסנכרן...";

    const dataRef = window.fbRef(window.fbDB, 'appData');
    window.fbOnValue(dataRef, (snapshot) => {
        const cloudData = snapshot.val();
        if (cloudData) {
            window.S = cloudData;
            S = cloudData;
            tag.innerText = "✅ ענן מחובר";
            tag.style.color = "#81c784";
            render();
        } else {
            tag.innerText = "☁️ ענן ריק";
            render();
        }
    });
}

async function saveToFirebase() {
    const ind = document.getElementById('backup-ind');
    ind.classList.add('show');
    try {
        S.ts = Date.now();
        await window.fbSet(window.fbRef(window.fbDB, 'appData'), S);
        setTimeout(() => ind.classList.remove('show'), 1500);
    } catch (e) {
        alert("שגיאה בשמירה: " + e.message);
    }
}

// --- פונקציות ליבה של האפליקציה המקורית ---
function setMode(m) {
    document.body.className = (m === 'purch') ? 'mode-purch' : 'mode-sched';
    document.getElementById('m-btn-sched').classList.toggle('active', m === 'sched');
    document.getElementById('m-btn-purch').classList.toggle('active', m === 'purch');
    document.getElementById('hdr-mode').innerText = (m === 'purch') ? 'מצב רכש' : 'מצב שיבוץ';
}

function showPanel(id) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('p-' + id).classList.add('active');
    document.querySelectorAll('.tab, .mob-nav-btn').forEach(t => t.classList.remove('active'));
    render();
}

function render() {
    const d = document.getElementById('view-date').value || new Date().toISOString().split('T')[0];
    document.getElementById('hdr-date').innerText = new Date(d).toLocaleDateString('he-IL');
    updateStats();
    renderPlacement(d);
}

function updateStats() {
    document.getElementById('st-total').innerText = S.gardens.length;
    document.getElementById('st-pending').innerText = S.events.filter(e => !e.done).length;
    document.getElementById('st-done').innerText = S.events.filter(e => e.done).length;
    document.getElementById('st-issue').innerText = S.events.filter(e => e.status === 'can').length;
}

function renderPlacement(date) {
    const cont = document.getElementById('placement-content');
    const dayEvents = S.events.filter(e => e.date === date);
    if (dayEvents.length === 0) {
        cont.innerHTML = '<div class="pempty">אין שיבוצים ליום זה.</div>';
        return;
    }
    let html = '<div class="pairs-4col">';
    dayEvents.forEach(ev => {
        html += `
            <div class="pair-card">
                <div class="pair-card-hdr" style="background:#1565c0">
                    <span>🕒 ${ev.time}</span>
                </div>
                <div class="pair-card-body">
                    <div class="pair-card-label"><div class="pcl-name">${ev.garden}</div></div>
                    <div class="pair-garden-row">
                        <div class="pgr-left">
                            <div class="pgr-name">${ev.teacher}</div>
                            <div class="pgr-status">${ev.done ? '✅ בוצע' : '⏳ ממתין'}</div>
                        </div>
                        <div class="pgr-right">
                             <button class="btn bsm bo" onclick="toggleEvent('${ev.id}')">${ev.done ? 'בטל' : 'בצע'}</button>
                        </div>
