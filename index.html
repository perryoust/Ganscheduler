<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>בדיקת כניסה</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #1a237e; color: white; margin: 0; }
        .box { background: white; padding: 30px; border-radius: 12px; text-align: center; color: #333; }
        input { width: 100%; padding: 10px; margin: 10px 0; font-size: 18px; text-align: center; }
        button { width: 100%; padding: 10px; background: #ff9800; color: white; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="box">
            <h2>טומשין קידס</h2>
            <input type="password" id="sys-pin" placeholder="****">
            <button onclick="checkLogin()">כניסה</button>
        </div>
    </div>

    <div id="app-main-container" style="display:none; padding: 20px; font-size: 24px;">
        ✅ הצלחת! האתר פתוח.
    </div>

    <script>
        function checkLogin() {
            const pin = document.getElementById('sys-pin').value;
            console.log("ניסיון כניסה עם:", pin);
            if (pin === "1234") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-main-container').style.display = 'block';
            } else {
                alert("קוד שגוי!");
            }
        }
    </script>
</body>
</html>
